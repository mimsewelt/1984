worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1024;

    # ── Security headers ──────────────────────────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m   rate=5r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream gateway {
        server gateway:8080;
        keepalive 32;
    }

    upstream minio {
        server minio:9000;
        keepalive 16;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max upload size for media
        client_max_body_size 50M;

        # Security headers
        add_header X-Frame-Options        SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection       "1; mode=block";
        add_header Referrer-Policy        strict-origin-when-cross-origin;

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://gateway/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── Media upload (upload rate limit) ─────────────────────────────────
        location /api/v1/media/ {
            limit_req zone=upload burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ── All other API endpoints ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── WebSocket (for messaging, Phase 2) ────────────────────────────────
        location /ws/ {
            proxy_pass          http://gateway;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── MinIO media files (public CDN-style access) ───────────────────────
        location /media/ {
            proxy_pass         http://minio/instagram-media/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;

            # Cache media files aggressively
            proxy_cache_valid  200 7d;
            add_header         Cache-Control "public, max-age=604800, immutable";
            add_header         X-Content-Type-Options nosniff;

            proxy_read_timeout 30s;
        }

        # ── Frontend (Phase 2, React SPA) ─────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── 429 error page ────────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"too many requests","retry_after":60}';
        }
    }
}
